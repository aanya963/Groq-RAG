<!DOCTYPE html>
<html>
<head>
    <title>RAG Q&A</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
        }

        button {
            padding: 10px 16px;
            border: none;
            background-color: #4f46e5;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background-color: #4338ca;
        }

        .answer-box {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            min-height: 50px;
            white-space: pre-wrap;
        }

        .label {
            margin-top: 20px;
            font-weight: bold;
        }

        .loading {
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📄 RAG Document Q&A</h2>

    <div class="input-group">
        <input type="text" id="question" placeholder="Ask something about the document..." />
        <button onclick="ask()">Ask</button>
    </div>

    <div class="label">Answer:</div>
    <div id="answer" class="answer-box"></div>
</div>

<script>
   // Generate a unique ID for this browser session
const conversationId = crypto.randomUUID();

async function ask() {
    let q = document.getElementById("question").value;
    let answerBox = document.getElementById("answer");

    if (!q) return;

    answerBox.innerHTML = "<span class='loading'>Thinking...</span>";

    try {
        let res = await fetch("http://localhost:5000/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                question: q,
                conversationId: conversationId  // send the same ID every time
            })
        });

        let data = await res.json();
        answerBox.innerText = data.answer;
    } catch (err) {
        answerBox.innerText = "Something went wrong.";
    }
}
/*


### How Memory Works Now
```
Browser opens → generates one conversationId (e.g. "abc-123")
                stays the same for the whole session

Question 1 → POST { question: "What is this doc about?",  conversationId: "abc-123" }
           ← "It's about financial reporting"
           → history["abc-123"] = [user: "What is...", assistant: "It's about..."]

Question 2 → POST { question: "Elaborate on that", conversationId: "abc-123" }
           → history["abc-123"] found → passed to LLM
           ← "The financial reporting covers..." ✅ remembers previous turn

        */
    document.getElementById("question").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            ask();
        }
    });
</script>

</body>
</html>
