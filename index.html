<!DOCTYPE html>
<html>
<head>
    <title>RAG Q&A</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            height: 100vh;
            background: #0f172a;
            color: #e5e7eb;
        }

        .container {
            background: #111827;
            display: flex;
            flex-direction: column;
            padding: 30px;
            border-radius: 16px;
            width: 800px;
            margin: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            border: 1px solid #1f2937;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #374151;
            outline: none;
            background: #020617;
            color: #e5e7eb;
        }

        input::placeholder {
            color: #6b7280;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
        }

        button {
            padding: 12px 18px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(99,102,241,0.4);
        }

        .answer-box {
            margin-top: 20px;
            padding: 16px;
            background: #020617;
            border-radius: 10px;
            min-height: 60px;
            white-space: pre-wrap;
            border: 1px solid #1f2937;
        }

        .label {
            margin-top: 20px;
            font-weight: 600;
            color: #9ca3af;
        }

        .loading {
            color: #6b7280;
            font-size: 14px;
        }

        #sidebar {
            width: 260px;
            background: #020617;
            padding: 15px;
            border-right: 1px solid #1f2937;
        }

        #sidebar button {
            width: 100%;
            margin-bottom: 10px;
            background: #111827;
            border: 1px solid #1f2937;
        }

        #sidebar button:hover {
            background: #1f2937;
            box-shadow: none;
        }

        #sidebar div {
            padding: 10px;
            border-radius: 8px;
            transition: 0.2s;
            font-size: 14px;
            color: #cbd5f5;
        }

        #sidebar div:hover {
            background: #111827;
        }

    </style>
</head>

<body>

<div style="display: flex; height: 100vh; width:100%;">

    <!-- Sidebar -->
    <div id="sidebar">
        <button onclick="newChat()">🆕 New Chat</button>
        <hr style="border-color:#1f2937" />
    </div>

    <!-- Main Chat -->
    <div class="container">
        <h2>📄 RAG Document Q&A</h2>

        <div class="input-group">
            <input type="text" id="question" placeholder="Ask something..." />
            <button onclick="ask()">Ask</button>
        </div>

        <div id="chatBox" class="answer-box"></div>
    </div>

</div>

</body>
<script>
    function addMessage(role, text) {
    const chatBox = document.getElementById("chatBox");

    const msg = document.createElement("div");
    msg.style.marginBottom = "12px";

    if (role === "user") {
        msg.innerHTML = `<b style="color:#818cf8">You:</b> ${text}`;
    } else {
        msg.innerHTML = `<b style="color:#34d399">AI:</b> ${text}`;
    }

    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}
async function loadHistory() {
    const conversationId = getOrCreateConversationId();

    try {
        let res = await fetch(`http://localhost:5000/history/${conversationId}`);
        let data = await res.json();

        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";

        data.forEach(msg => {
            addMessage(msg.role, msg.content);
        });

    } catch (err) {
        console.log("Failed to load history");
    }
}
// 🔹 Get chatId from URL
function getConversationIdFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get("chat");
}

// 🔹 Create or reuse chatId
function getOrCreateConversationId() {
    let id = getConversationIdFromURL();

    if (!id) {
        id = crypto.randomUUID();
        window.history.pushState({}, "", `?chat=${id}`);
    }

    saveChatId(id);
    return id;
}

// 🔹 Save chat list in localStorage
function saveChatId(id) {
    let chats = JSON.parse(localStorage.getItem("chats") || "[]");

    if (!chats.includes(id)) {
        chats.push(id);
        localStorage.setItem("chats", JSON.stringify(chats));
    }
}

// 🔹 Render sidebar
function renderSidebar() {
    const chats = JSON.parse(localStorage.getItem("chats") || "[]");
    const sidebar = document.getElementById("sidebar");

    sidebar.innerHTML = `<button onclick="newChat()">🆕 New Chat</button><hr style="border-color:#1f2937"/>`;

    chats.forEach(id => {
        const div = document.createElement("div");
        div.innerText = id.substring(0, 8);
        div.style.cursor = "pointer";
        div.style.margin = "5px 0";

        div.onclick = () => {
            window.location.href = `?chat=${id}`;
        };

        sidebar.appendChild(div);
    });
}

// 🔹 Ask API
async function ask() {
    let q = document.getElementById("question").value;
    let answerBox = document.getElementById("answer");

    if (!q) return;

  addMessage("user", q);
addMessage("assistant", "Thinking...");

    const conversationId = getOrCreateConversationId();

    try {
        let res = await fetch("http://localhost:5000/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                question: q,
                conversationId: conversationId
            })
        });

        let data = await res.json();
      const chatBox = document.getElementById("chatBox");

// remove "Thinking..."
chatBox.lastChild.remove();

addMessage("assistant", data.answer);

    } catch (err) {
        answerBox.innerText = "Error occurred";
    }
}

// 🔹 New chat
function newChat() {
    const newId = crypto.randomUUID();
    window.location.href = `?chat=${newId}`;
}

// 🔹 Enter key support
document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") ask();
});

// 🔹 Load sidebar on start
renderSidebar();
renderSidebar();
loadHistory();
</script>
</html>
